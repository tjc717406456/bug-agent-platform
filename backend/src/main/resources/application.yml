server:
  port: 8088
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bug_agent?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB
  sql:
    init:
      mode: always

app:
  workspace-root: ./workspace
  task-ttl-seconds: 1800
  async:
    core-pool-size: 2
    max-pool-size: 8
    queue-capacity: 50
  dbhub:
    max-pool-size: 3
    min-idle: 0
    connection-timeout-ms: 10000
  agent:
    max-iterations: 32
    initial-evidence-limit: 12000
    sql-text-limit: 2000
    tool-result-limit: 4000
    self-critique: true
    tool-timeout-seconds: 60
    tool-fanout-pool-size: 8
  ai:
    # 先关流式验证 tool_calls 是否被流式解析弄丢；排查完想用流式改回 true
    stream-enabled: true
  eval:
    cases-path: ./workspace/eval-cases.json
  log:
    dir: ./workspace/logs
    max-bytes: 10485760
    retention-days: 1
