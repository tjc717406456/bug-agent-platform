server:
  port: 8088
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bug_agent?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB
  sql:
    init:
      mode: always

app:
  workspace-root: ./workspace
  task-ttl-seconds: 1800
  async:
    core-pool-size: 2
    max-pool-size: 8
    queue-capacity: 50
  dbhub:
    max-pool-size: 3
    min-idle: 0
    connection-timeout-ms: 10000
  agent:
    max-iterations: 32
    initial-evidence-limit: 24000
    sql-text-limit: 2000
    tool-result-limit: 4000
    self-critique: true
    tool-timeout-seconds: 60
    tool-fanout-pool-size: 8
    # 分阶段工具集：先读代码/看表结构，再解锁 query_database 查库取证
    phased-tools: true
    # 多假设并行：OFF 单链 / ON 多候选即并行 / AUTO 仅歧义时并行
    # 必须加引号！YAML 会把裸 OFF/NO/FALSE 当布尔，绑到字符串字段成了 "false"，绕过 OFF 判断
    hypothesis-mode: "OFF"
    hypothesis-max-branches: 2
    hypothesis-min-score-gap: 25
    hypothesis-chain-iterations: 12
    hypothesis-pool-size: 2
  ai:
    # 先关流式验证 tool_calls 是否被流式解析弄丢；排查完想用流式改回 true
    stream-enabled: true
  eval:
    cases-path: ./workspace/eval-cases.json
  log:
    dir: ./workspace/logs
    max-bytes: 52428800
    retention-days: 1
