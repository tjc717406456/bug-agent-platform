server:
  port: 8088
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bug_agent?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB
  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 下划线列名自动映射到驼峰字段：project_id → projectId,省得写 resultMap
    map-underscore-to-camel-case: true

app:
  workspace-root: ./workspace
  task-ttl-seconds: 1800
  auth:
    # 登录 token 在 Redis 的存活时间；活跃用户自动滑动续期
    token-ttl-seconds: 43200
    admin-username: admin
    # 留空则首次启动随机生成初始密码并在日志打印一次。生产用环境变量注入：
    #   BUGAGENT_ADMIN_PASSWORD=xxx  →  admin-initial-password: ${BUGAGENT_ADMIN_PASSWORD:}
    admin-initial-password: ${BUGAGENT_ADMIN_PASSWORD:}
    max-login-failures: 5
    login-lock-seconds: 300
  security:
    # AI apiKey 与数据库密码的落盘加密主密钥：base64 编码的 32 字节。留空则不加密（本地开发用）。
    # 生成：openssl rand -base64 32     生产用环境变量注入，切勿写进代码仓库。
    # 注意：密钥丢失后已加密的密钥无法恢复，务必与数据库一起备份。
    master-key: ${BUGAGENT_MASTER_KEY:}
  async:
    core-pool-size: 2
    max-pool-size: 8
    queue-capacity: 50
  dbhub:
    max-pool-size: 3
    min-idle: 0
    connection-timeout-ms: 10000
  agent:
    # RUNNING 任务超过此时间没有检查点/进度心跳，轮询时标记为 INTERRUPTED
    task-stale-seconds: 600
    max-iterations: 32
    initial-evidence-limit: 24000
    sql-text-limit: 2000
    tool-result-limit: 4000
    # get_code_detail 整段方法读取的更大窗口，避免长方法尾部根因被 tool-result-limit 截断
    code-result-limit: 8000
    # 上下文衰减：保留最近 N 轮工具结果全文，更早的折叠成摘要行，控长案例 token 膨胀。0=不衰减
    keep-recent-rounds: 6
    self-critique: true
    tool-timeout-seconds: 60
    tool-fanout-pool-size: 8
    # 分阶段工具集：先读代码/看表结构，再解锁 query_database 查库取证
    phased-tools: true
    # 相似案例召回已关：bug 定位是证据驱动，历史结论增益有限还可能锚定误导；哪天做"错例纠偏"再开
    enable-similar-case: false
    # 多假设并行：OFF 单链 / ON 多候选即并行 / AUTO 仅歧义时并行
    # 必须加引号！YAML 会把裸 OFF/NO/FALSE 当布尔，绑到字符串字段成了 "false"，绕过 OFF 判断
    hypothesis-mode: "OFF"
    hypothesis-max-branches: 2
    hypothesis-min-score-gap: 25
    hypothesis-chain-iterations: 12
    hypothesis-pool-size: 2
  ai:
    # 关流式：网关掐连接时退流式重试，疑似把 finish 的 tool_call 弄丢→"收尾不调工具"。
    # 关了全程非流式（tool_call 整段解析最可靠）；网关掐了仍非流式重试。验证稳了再决定要不要改回 true。
    stream-enabled: false
  eval:
    cases-path: ./workspace/eval-cases.json
  log:
    dir: ./workspace/logs
    max-bytes: 52428800
    retention-days: 1
